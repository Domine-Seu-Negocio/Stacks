# Alertmanager — routing, grouping, inhibition.
# Slack webhook is provided as a Swarm secret mounted at the path below (never
# inline the URL). Create it once:
#   printf '%s' "$SLACK_WEBHOOK_URL" | docker secret create alertmanager_slack_url -
# and add to the alertmanager service:
#   secrets: [{ source: alertmanager_slack_url, target: slack_url }]
global:
  resolve_timeout: 5m
  slack_api_url_file: /run/secrets/slack_url

route:
  receiver: slack-default
  group_by: ["alertname", "team", "node"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="critical"']
      receiver: slack-critical
      repeat_interval: 1h
      continue: false

receivers:
  - name: slack-default
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        title: '🔴 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

# A critical alert mutes the matching warning for the same scope.
inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: ["alertname", "node"]
