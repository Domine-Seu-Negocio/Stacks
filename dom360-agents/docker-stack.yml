# ------------------------------------------------------------------------------
# DOM360-Agents swarm stack (dev env) — mirrors the live Portainer stack `sdr`.
# SDR/Copilot API + voice worker + self-hosted LiveKit (server + SIP + redis).
# Source of truth: this file in the Stacks repo. Do NOT edit via Portainer.
#
# Why the long per-port lists (50000-50100 / 10000-10100, mode: host):
#   LiveKit RTP/SIP media must bypass the Swarm ingress routing mesh — published
#   with `mode: host` per port so packets hit the node directly (NAT/WebRTC).
#   A `range:range/udp` short form would default to ingress and break media.
#
# External Swarm configs (bootstrap once, see README; secret-bearing → not in git):
#   livekit_config     -> dom360_livekit_config_20260602_nat (nat_1_to_1 media fix)
#   livekit_sip_config -> dom360_livekit_sip_config
#
# Image is pinned by tag — bump it on sdr-agent AND voice-agent (same image),
# commit, then redeploy.
# ------------------------------------------------------------------------------

services:
  sdr-agent:
    image: deselles/sdr-agent:09d2c5d7529df9dbb0645a545137c989ae311535
    command: ["uv", "run", "python", "main.py", "api"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/mcp >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      # PostgreSQL Database Configuration
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-dom360_db_sdk}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}

      # LLM / cloud providers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_KB_ID=${BEDROCK_KB_ID:-HNFLQEINAK}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}

      # Knowledge Base
      - KB_PROVIDER=vectorizer
      - KB_MAX_RESULTS=5
      - KB_SEARCH_TYPE=SEMANTIC

      # SDK Backend
      - SDK_BACKEND_URL=${SDK_BACKEND_URL:-https://api-dev.domineseunegocio.com.br}
      - SDK_API_TOKEN=${SDK_API_TOKEN:-}

      # Shared secret for SDK ↔ Agents mutual authentication
      - AGENT_SHARED_SECRET=${AGENT_SHARED_SECRET}

      # Self-hosted LiveKit
      - LIVEKIT_URL=ws://livekit-server:7880
      # Public URL handed to the browser by /voice/room. MUST be the external
      # wss endpoint (Traefik /livekit) — without it the handler falls back to
      # the internal LIVEKIT_URL (ws://livekit-server:7880), which the browser
      # cannot reach (and ws:// on an https page is mixed-content blocked).
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-wss://agente-dev.domineseunegocio.com.br/livekit}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_SIP_OUTBOUND_TRUNK_ID=${LIVEKIT_SIP_OUTBOUND_TRUNK_ID:-}

    networks:
      network_public:
        aliases:
          - sdr-agent
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        traefik.enable: "true"
        traefik.http.routers.sdr-agent.rule: "Host(`agente-dev.domineseunegocio.com.br`)"
        traefik.http.routers.sdr-agent.entrypoints: "websecure"
        traefik.http.routers.sdr-agent.tls.certresolver: "letsencryptresolver"
        traefik.http.services.sdr-agent.loadbalancer.server.port: "8000"
        traefik.http.routers.sdr-agent.service: "sdr-agent"
        traefik.http.middlewares.sdr-agent-stripprefix.stripprefix.prefixes: "/"
        traefik.http.routers.sdr-agent.middlewares: "sdr-agent-stripprefix"

  voice-agent:
    image: deselles/sdr-agent:09d2c5d7529df9dbb0645a545137c989ae311535
    command: ["uv", "run", "python", "-m", "src.core.voice.livekit.server", "start"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

      # PostgreSQL Database Configuration
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-dom360_db_sdk}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}

      # LLM / cloud providers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_KB_ID=${BEDROCK_KB_ID:-HNFLQEINAK}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY:-}

      # Knowledge Base
      - KB_PROVIDER=vectorizer
      - KB_MAX_RESULTS=5
      - KB_SEARCH_TYPE=SEMANTIC

      # SDK Backend / SDK Voice bridge
      - SDK_BACKEND_URL=${SDK_BACKEND_URL:-https://api-dev.domineseunegocio.com.br}
      - SDK_API_TOKEN=${SDK_API_TOKEN:-}
      - SDK_VOICE_ENABLED=true
      - SDK_VOICE_TENANT_ID=${SDK_VOICE_TENANT_ID:-0}
      - SDK_VOICE_INBOX_ID=${SDK_VOICE_INBOX_ID:-0}

      # Shared secret for SDK ↔ Agents mutual authentication
      - AGENT_SHARED_SECRET=${AGENT_SHARED_SECRET}

      # Self-hosted LiveKit
      - LIVEKIT_URL=ws://livekit-server:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_SIP_OUTBOUND_TRUNK_ID=${LIVEKIT_SIP_OUTBOUND_TRUNK_ID:-}

      # SIP mode: native (LiveKit SIP trunks) or legacy (pyVoIP bridge)
      - SIP_MODE=${SIP_MODE:-native}
      - VOICE_IDLE_PROCESSES=${VOICE_IDLE_PROCESSES:-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # SDK Voice API token (must be sdk_* token, NOT a user JWT)
      - SDK_VOICE_API_TOKEN=${SDK_VOICE_API_TOKEN:-}

      # SIP providers
      - WAVOIP_SIP_SERVER=${WAVOIP_SIP_SERVER:-sipv2.wavoip.com}
      - WAVOIP_SIP_PORT=${WAVOIP_SIP_PORT:-5060}
      - WAVOIP_DEVICE_TOKEN=${WAVOIP_DEVICE_TOKEN:-}
      - WAVOIP_SIP_USERNAME=${WAVOIP_SIP_USERNAME}
      - WAVOIP_SIP_PASSWORD=${WAVOIP_SIP_PASSWORD}
      - KROLIK_SIP_SERVER=${KROLIK_SIP_SERVER:-54.232.108.90}
      - KROLIK_SIP_PORT=${KROLIK_SIP_PORT:-5060}
      - KROLIK_SIP_USERNAME=${KROLIK_SIP_USERNAME:-}
      - KROLIK_SIP_PASSWORD=${KROLIK_SIP_PASSWORD:-}

    networks:
      network_public:
        aliases:
          - voice-agent
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5

